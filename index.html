<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СТОП! Не дай себя обмануть — игра-тренажёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.2s;
        }
        .header {
            background: #ff3b3b;
            background: linear-gradient(135deg, #ff3b3b, #ff8c00);
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            color: white;
            font-weight: 900;
        }
        .header p {
            color: #fff3bf;
            font-weight: bold;
            font-size: 1rem;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #00000066;
            padding: 12px 28px;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid #ffaa3377;
        }
        .score-box, .question-counter {
            background: #00000099;
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 1.2rem;
        }
        .content {
            padding: 28px;
        }
        .scenario {
            background: #0f1629;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-left: 8px solid #ff9900;
        }
        .scenario h2 {
            color: #ffaa44;
            margin-bottom: 18px;
            font-size: 1.7rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .message {
            background: #1e2a3e;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            font-style: italic;
            border: 1px solid #ffaa3366;
            color: #f0f0f0;
            font-weight: 500;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 24px 0;
        }
        .option-btn {
            background: #1e2a3e;
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: 0.1s linear;
            color: white;
            font-family: inherit;
            border: 1px solid #3a4a66;
        }
        .option-btn:hover {
            background: #2a3a52;
            transform: scale(1.01);
            border-color: #ffaa55;
        }
        .option-btn:active {
            transform: scale(0.99);
        }
        .feedback {
            background: #000000aa;
            padding: 16px;
            border-radius: 28px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            border-left: 6px solid #ffaa44;
        }
        .next-btn {
            background: linear-gradient(95deg, #ff8800, #ffcc00);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: #1e1a0a;
        }
        .next-btn:active {
            transform: scale(0.97);
        }
        .final-screen {
            text-align: center;
            padding: 20px;
        }
        .restart-btn {
            background: #ffaa33;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
            cursor: pointer;
        }
        .copyright {
            text-align: center;
            font-size: 0.75rem;
            padding: 18px;
            color: #aaa;
            border-top: 1px solid #2a3a55;
            background: #03060e;
        }
        .green-feedback { color: #b3ffaa; border-left-color: #2eff2e; }
        .red-feedback { color: #ffb3b3; border-left-color: #ff4444; }
        button {
            user-select: none;
        }
        @media (max-width: 550px) {
            .content { padding: 18px; }
            .scenario h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="header">
        <h1>⛔ НЕ ДАЙ СЕБЯ ОБМАНУТЬ</h1>
        <p>ИГРА-ТРЕНАЖЁР 🔥 КИБЕРБЕЗОПАСНОСТЬ</p>
    </div>
    <div class="stats">
        <div class="score-box">🎯 Очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 Вопрос <span id="qCurrent">1</span> / <span id="qTotal">4</span></div>
    </div>
    <div class="content" id="dynamicContent">
        <!-- сценарии будут загружены js -->
    </div>
    <div class="copyright">
        narven_olgui © 2026 · Профилактика вовлечения подростков в преступления через мессенджеры
    </div>
</div>
<script>
    // --------------------------------------------------------------
    //  СЦЕНАРИИ (полностью на основе реальных случаев Москва 2025-26)
    // --------------------------------------------------------------
    const scenarios = [
        { // 1
            title: "🔥 Звонок от «следователя»",
            message: "Тебе приходит сообщение в Telegram от человека с фото полицейского удостоверения: \n\n«Срочно! Твой друг замешан в теракте. Помоги следствию — подожги банкомат на углу. Иначе тебя посадят как соучастника!»",
            options: [
                "A) Сразу бегу с зажигалкой к банкомату — боюсь за друга.",
                "B) Требую личной встречи в отделении полиции и говорю родителям.",
                "C) Предлагаю перевести деньги, чтобы отмазать друга."
            ],
            correct: 1, // индекс правильного (0,1,2) -> B
            explanation: "✅ Настоящий следователь никогда не попросит подростка совершить поджог. Ты оборвал диалог и сообщил взрослым — схема провалена.",
            wrongExplanations: [
                "❌ Ты совершил поджог — теперь тебе грозит от 5 до 20 лет тюрьмы и иск на миллионы рублей. Мошенник сразу исчезнет.",
                "❌ Мошенник просто обворует тебя и продолжит шантажировать. Не переводи незнакомцам!"
            ],
            tip: "📌 Любой незнакомец, требующий преступления — мошенник. Алгоритм: СТОП → ПОСОВЕТУЙСЯ С РОДИТЕЛЯМИ → СООБЩИ В ПОЛИЦИЮ (102)."
        },
        { // 2
            title: "💔 «Девушка» из соцсетей",
            message: "Ты познакомился с красивой девушкой (фото модели) в Instagram. Она пишет: \n\n«Привет, ты мне очень нравишься! Помоги снять видео для моего блога: подожги АЗС, я дам тебе 30 000 руб. и мы встретимся. Никому не говори!»",
            options: [
                "A) Соглашаюсь — и деньги, и девушка, что может пойти не так?",
                "B) Пишу: «Встретимся сначала в реальности» — если откажется, блокирую и говорю родителям.",
                "C) Прошу прислать интимные фото в ответ."
            ],
            correct: 1,
            explanation: "✅ Мошенник никогда не согласится на реальную встречу. Ты его раскусил и избежал уголовки.",
            wrongExplanations: [
                "❌ Реальные случаи: в феврале 2026 года 14-летний подросток поджёг банкомат по просьбе «девушки» с сайта знакомств. Его задержали, девушки не существовало.",
                "❌ Мошенники могут использовать твои фото для шантажа. Не пересылай интимных материалов!"
            ],
            tip: "📌 За красивым аватаром часто стоит мошенник из другой страны. Реальная девушка не попросит тебя стать преступником."
        },
        { // 3
            title: "💰 Легкий заработок",
            message: "В TikTok тебе приходит реклама: «Заработай 50 000 руб. за час! Нужно просто кинуть коктейль Молотова в банкомат. Платёж сразу на карту.» \n\n«Это не больно, банкомат застрахован. Никто не пострадает!»",
            options: [
                "A) Берусь — деньги нужны на новый айфон.",
                "B) Игнорирую, блокирую и жалуюсь на рекламу.",
                "C) Прошу предоплату 50% и потом исчезаю."
            ],
            correct: 1,
            explanation: "✅ Ты не повелся на легкие деньги. В марте 2026 года 15-летний парень получил ожоги 40% тела при поджоге банкомата — его не заплатили, а посадили.",
            wrongExplanations: [
                "❌ Ты становишься фигурантом дела о теракте. Срок — до 20 лет. Денег ты не увидишь, а родителям придётся продать квартиру для возмещения ущерба.",
                "❌ Ты не обманешь преступников — они запишут твой отказ и передадут в полицию как «уклонение от задания». Риск огромен."
            ],
            tip: "📌 Ни один честный работодатель не попросит тебя совершить преступление. Легких денег не бывает — только уголовка."
        },
        { // 4
            title: "😨 Угроза родителям",
            message: "Незнакомец в мессенджере пишет, что знает адрес твоей семьи. Сообщение: \n\n«Если ты не подорвешь банкомат у метро до 19:00, мы убьём твою маму. Видео с поджогом обязательно. Никому не звони!»",
            options: [
                "A) В панике бегу к банкомату, лишь бы маму не тронули.",
                "B) Немедленно звоню маме, затем в полицию 102, показываю угрозы.",
                "C) Пишу мошеннику, чтобы он прислал доказательство."
            ],
            correct: 1,
            explanation: "✅ 99% угроз — фейк. Мошенники не могут найти твою семью, если ты сам им не поможешь. Полиция задержит их по IP. Ты спас себя и близких.",
            wrongExplanations: [
                "❌ Ты совершишь теракт, а маму всё равно не тронут — мошенники просто хотели, чтобы ты сделал их «грязную работу». После поджога тебя арестуют, а родители будут платить миллионы.",
                "❌ Любое обсуждение с мошенником даёт ему больше рычагов давления. Сразу блокируй и сообщай взрослым."
            ],
            tip: "📌 При угрозе жизни близких — СРАЗУ ЗВОНИ В ПОЛИЦИЮ 102. Никогда не выполняй требований преступников."
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;      // заблокировать кнопки после ответа
    let selectedOption = -1;

    const dynamicDiv = document.getElementById('dynamicContent');
    const scoreSpan = document.getElementById('scoreValue');
    const qCurrentSpan = document.getElementById('qCurrent');
    const qTotalSpan = document.getElementById('qTotal');

    function updateUI() {
        scoreSpan.innerText = score;
        qCurrentSpan.innerText = currentIndex+1;
        qTotalSpan.innerText = scenarios.length;
    }

    function renderCurrent() {
        if (currentIndex >= scenarios.length) {
            // игра закончена
            showFinalScreen();
            return;
        }
        const s = scenarios[currentIndex];
        let html = `
            <div class="scenario">
                <h2>${s.title}</h2>
                <div class="message">${s.message.replace(/\n/g, '<br>')}</div>
                <div class="options" id="optionsContainer">
        `;
        s.options.forEach((opt, idx) => {
            html += `<button class="option-btn" data-opt-index="${idx}">${opt}</button>`;
        });
        html += `</div><div id="feedbackArea" class="feedback" style="display: none;"></div>`;
        if (answered && selectedOption !== -1) {
            // уже был ответ
            const isCorrect = (selectedOption === s.correct);
            const feedbackDiv = document.createElement('div');
            // но мы пересоздадим через setTimeout или сразу добавим, но проще в рендере добавить
            // сделаем так: после рендера добавим содержимое feedback, но т.к. answered true, покажем его
        }
        html += `<button class="next-btn" id="nextButton">➡ ДАЛЬШЕ</button></div>`;
        dynamicDiv.innerHTML = html;

        // навесить обработчики
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answered) return;
                const idx = parseInt(btn.dataset.optIndex);
                handleAnswer(idx);
            });
        });
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!answered) return;
                // переход к следующему сценарию
                currentIndex++;
                answered = false;
                selectedOption = -1;
                if (currentIndex < scenarios.length) {
                    renderCurrent();
                    updateUI();
                } else {
                    renderCurrent(); // вызовет финал
                    updateUI();
                }
            });
        }
        // если уже отвечено на этом сценарии (при перерендере) - показать feedback
        if (answered && selectedOption !== -1) {
            const sCurr = scenarios[currentIndex];
            const isCorrect = (selectedOption === sCurr.correct);
            const feedbackDiv = document.getElementById('feedbackArea');
            if (feedbackDiv) {
                feedbackDiv.style.display = 'block';
                let feedbackText = '';
                if (isCorrect) {
                    feedbackText = `<span style="color:#b3ffaa;">✅ ${sCurr.explanation}</span><br><br>${sCurr.tip}`;
                    feedbackDiv.classList.add('green-feedback');
                } else {
                    let wrongMsg = (selectedOption === 0) ? sCurr.wrongExplanations[0] : (selectedOption === 1 ? sCurr.wrongExplanations[1] : sCurr.wrongExplanations[0]);
                    if (selectedOption === 2 && sCurr.wrongExplanations[1]) wrongMsg = sCurr.wrongExplanations[1];
                    feedbackText = `<span style="color:#ffb3b3;">${wrongMsg}</span><br><br>${sCurr.tip}`;
                    feedbackDiv.classList.add('red-feedback');
                }
                feedbackDiv.innerHTML = feedbackText;
            }
            // заблокировать кнопки визуально
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.style.opacity = '0.6';
                btn.style.pointerEvents = 'none';
            });
        }
        updateUI();
    }

    function handleAnswer(optIndex) {
        if (answered) return;
        answered = true;
        selectedOption = optIndex;
        const s = scenarios[currentIndex];
        const isCorrect = (optIndex === s.correct);
        if (isCorrect) {
            score += 20;
            updateUI();
        }
        // отобразить feedback в уже существующем блоке
        const feedbackDiv = document.getElementById('feedbackArea');
        if (feedbackDiv) {
            feedbackDiv.style.display = 'block';
            let feedbackText = '';
            if (isCorrect) {
                feedbackText = `<span style="color:#b3ffaa;">✅ ${s.explanation}</span><br><br>${s.tip}`;
                feedbackDiv.classList.add('green-feedback');
            } else {
                let wrongIdx = (optIndex === 0) ? 0 : (optIndex === 1 ? 1 : 0);
                if (optIndex === 2 && s.wrongExplanations[1]) wrongIdx = 1;
                let wrongMsg = s.wrongExplanations[wrongIdx] || s.wrongExplanations[0];
                feedbackText = `<span style="color:#ffb3b3;">❌ ${wrongMsg}</span><br><br>${s.tip}`;
                feedbackDiv.classList.add('red-feedback');
            }
            feedbackDiv.innerHTML = feedbackText;
        }
        // заблокировать кнопки выбора
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.style.opacity = '0.6';
            btn.style.pointerEvents = 'none';
        });
        updateUI();
    }

    function showFinalScreen() {
        const maxScore = scenarios.length * 20;
        let message = '';
        if (score === maxScore) {
            message = `🎉 ОТЛИЧНО! ${score}/${maxScore} очков. Ты неуязвим для мошенников! Помни: в Москве уже 8 пострадавших подростков, но ты не стал девятым.`;
        } else if (score >= 40) {
            message = `👍 ХОРОШО! ${score}/${maxScore}. Но есть пробелы. Пересмотри алгоритмы безопасности.`;
        } else {
            message = `⚠️ Ты в группе риска! ${score}/${maxScore}. Переиграй ещё раз — это спасёт твою жизнь и свободу.`;
        }
        const finalHtml = `
            <div class="final-screen">
                <h2 style="color:#ffaa44;">🏆 ИТОГОВАЯ ОЦЕНКА</h2>
                <p style="font-size:1.6rem; margin:20px 0;">${score} / ${maxScore}</p>
                <p style="background:#00000099; padding:16px; border-radius:28px;">${message}</p>
                <div style="margin: 20px 0; text-align:left; background:#0f1629; border-radius:24px; padding:16px;">
                    <p style="color:#ffcc88;">📢 ГЛАВНЫЕ ПРАВИЛА:</p>
                    <p>1️⃣ Никогда не выполняй действий с огнём, взрывчаткой или повреждением имущества по просьбе из интернета.</p>
                    <p>2️⃣ Любой незнакомец, требующий преступления — мошенник.</p>
                    <p>3️⃣ Сообщи родителям или в полицию (102) — это снимает с тебя ответственность.</p>
                    <p>4️⃣ Сохраняй переписку — она твоё доказательство в суде.</p>
                    <p style="color:#ff7777;">⚖️ Уголовная ответственность с 14 лет. Штрафы до миллионов, срок до 20 лет.</p>
                </div>
                <button class="restart-btn" id="restartGameBtn">🔄 Играть заново</button>
            </div>
        `;
        dynamicDiv.innerHTML = finalHtml;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            score = 0;
            answered = false;
            selectedOption = -1;
            renderCurrent();
            updateUI();
        });
    }

    // старт
    renderCurrent();
</script>
</body>
</html>
